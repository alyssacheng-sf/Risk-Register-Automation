# Risk categorization keywords
# Each category has keywords that are matched against risk name + details (case-insensitive)
# A risk can belong to multiple categories

categories:
  security:
    keywords:
      - auth
      - authentication
      - authorization
      - vulnerability
      - encryption
      - breach
      - credential
      - secret
      - JWT
      - token
      - SSO
      - certificate
      - TLS
      - SSL
      - injection
      - XSS
      - CSRF
      - permission
      - access control
      - CIAM
    color: "#e74c3c"

  performance:
    keywords:
      - latency
      - timeout
      - slow
      - throughput
      - response time
      - bottleneck
      - memory leak
      - CPU
      - performance
      - cache
      - caching
      - connection pool
      - thread pool
      - deadlock
      - blocking
      - queue depth
    color: "#f39c12"

  reliability:
    keywords:
      - outage
      - downtime
      - availability
      - failover
      - redundancy
      - single point of failure
      - crash
      - restart
      - recovery
      - resilience
      - circuit breaker
      - health check
      - monitoring
      - alerting
      - SLA
      - uptime
      - incident
    color: "#e67e22"

  scalability:
    keywords:
      - capacity
      - scale
      - scaling
      - growth
      - volume
      - high volume
      - load
      - horizontal
      - vertical
      - shard
      - partition
      - throughput limit
      - rate limit
      - throttle
      - concurren
      - burst
    color: "#3498db"

  data:
    keywords:
      - database
      - DB
      - data loss
      - data integrity
      - migration
      - schema
      - backup
      - restore
      - replication
      - consistency
      - corruption
      - storage
      - retention
      - GDPR
      - privacy
      - PII
    color: "#9b59b6"

  infrastructure:
    keywords:
      - network
      - DNS
      - load balancer
      - firewall
      - server
      - host
      - deployment
      - rollback
      - feature flag
      - kill switch
      - config
      - infrastructure
      - stack
      - cluster
      - node
      - container
      - kubernetes
      - hyperforce
